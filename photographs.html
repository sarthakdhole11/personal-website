<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>photographs — sarthak dhole</title>

  <style>
    :root {
      --bg: #faf9f6;
      --text: #111111;
      --muted: rgba(17, 17, 17, 0.58);
      --soft: rgba(17, 17, 17, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1120px;
      margin: 0 auto;
      padding: 34px 18px 80px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 52px;
      font-size: 0.86rem;
    }

    .topbar a {
      opacity: 0.62;
      transition: opacity 0.2s ease;
    }

    .topbar a:hover {
      opacity: 1;
    }

    .header {
      margin-bottom: 34px;
    }

    .header h1 {
      margin: 0 0 7px;
      font-size: 1.45rem;
      font-weight: 400;
      letter-spacing: -0.025em;
      text-transform: lowercase;
    }

    .header p {
      max-width: 460px;
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.55;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 22px;
      font-size: 0.82rem;
    }

    .filters button {
      padding: 0;
      border: 0;
      background: none;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      opacity: 0.48;
      transition: opacity 0.2s ease;
    }

    .filters button:hover,
    .filters button.active {
      opacity: 1;
    }

    .grid {
      column-count: 3;
      column-gap: 18px;
    }

    .photo {
      position: relative;
      display: block;
      margin: 0 0 18px;
      break-inside: avoid;
      overflow: hidden;
      background: #eeeeee;
      cursor: zoom-in;
    }

    .photo img {
      width: 100%;
      height: auto;
      display: block;
      transform: scale(1);
      transition: transform 0.45s ease, filter 0.45s ease;
    }

    .photo figcaption {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 3px;
      padding: 14px;
      color: white;
      font-size: 0.72rem;
      line-height: 1.35;
      background:
        linear-gradient(
          to top,
          rgba(0, 0, 0, 0.66),
          rgba(0, 0, 0, 0.14),
          rgba(0, 0, 0, 0)
        );
      opacity: 0;
      transition: opacity 0.24s ease;
      pointer-events: none;
    }

    .photo figcaption span:first-child {
      font-size: 0.84rem;
      margin-bottom: 2px;
    }

    .photo:hover img {
      transform: scale(1.018);
      filter: contrast(0.96) brightness(0.96);
    }

    .photo:hover figcaption {
      opacity: 1;
    }

    .photo.hidden {
      display: none;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 28px;
      background: rgba(250, 249, 246, 0.96);
      cursor: zoom-out;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 96vw;
      max-height: 90vh;
      object-fit: contain;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.12);
    }

    .lightbox-meta {
      position: fixed;
      left: 22px;
      bottom: 18px;
      color: rgba(17, 17, 17, 0.68);
      font-size: 0.78rem;
      line-height: 1.45;
      max-width: 320px;
      pointer-events: none;
    }

    .footer {
      margin-top: 58px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    @media (max-width: 850px) {
      .grid {
        column-count: 2;
        column-gap: 14px;
      }

      .photo {
        margin-bottom: 14px;
      }

      .topbar {
        margin-bottom: 38px;
      }
    }

    @media (max-width: 540px) {
      .page {
        padding: 28px 12px 64px;
      }

      .topbar {
        font-size: 0.82rem;
      }

      .header h1 {
        font-size: 1.32rem;
      }

      .grid {
        column-count: 1;
      }

      .photo figcaption {
        opacity: 1;
      }

      .lightbox {
        padding: 14px;
      }

      .lightbox-meta {
        left: 14px;
        right: 14px;
        bottom: 12px;
        font-size: 0.72rem;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <nav class="topbar">
      <a href="/">← sarthak dhole</a>
      <a href="https://www.sarthakdhole.com">home</a>
    </nav>

    <header class="header">
      <h1>photographs</h1>
      <p></p>

      <div class="filters">
        <button class="active" data-filter="all">all</button>
        <button data-filter="europe">europe</button>
        <button data-filter="india">asia</button>
        <button data-filter="people">people</button>
        <button data-filter="places">places</button>
        <button data-filter="places">abstract</button>
        <button data-filter="places">abstract</button>


      </div>
    </header>

    <section class="grid">

      <figure class="photo" data-category="europe">
        <img

        <figcaption>

      </figure>

      <figure class="photo" data-category="europe places">
        <img
          src="/images/photo-2.jpg"
          alt="night street in zagreb"
          data-meta="zagreb, 2026 | iphone 13 · 26mm · f/1.6 | 3024 × 4032 px"
        />
        <figcaption>
          <span>zagreb, 2026</span>
          <span>iphone 13 · 26mm · f/1.6</span>
          <span>3024 × 4032 px</span>
        </figcaption>
      </figure>

      <figure class="photo" data-category="europe places">
        <img
          src="/images/photo-3.jpg"
          alt="ljubljana street"
          data-meta="ljubljana, 2026 | iphone 13 · 26mm · f/1.6 | 4032 × 3024 px"
        />
        <figcaption>
          <span>ljubljana, 2026</span>
          <span>iphone 13 · 26mm · f/1.6</span>
          <span>4032 × 3024 px</span>
        </figcaption>
      </figure>

      <figure class="photo" data-category="india people">
        <img
          src="/images/photo-4.jpg"
          alt="portrait in jaipur"
          data-meta="jaipur, 2026 | fujifilm · 35mm equiv. | 6240 × 4160 px"
        />
        <figcaption>
          <span>jaipur, 2026</span>
          <span>fujifilm · 35mm equiv.</span>
          <span>6240 × 4160 px</span>
        </figcaption>
      </figure>

      <figure class="photo" data-category="europe places">
        <img
          src="/images/photo-5.jpg"
          alt="warsaw building"
          data-meta="warsaw, 2026 | iphone 13 · 26mm · f/1.6 | 4032 × 3024 px"
        />
        <figcaption>
          <span>warsaw, 2026</span>
          <span>iphone 13 · 26mm · f/1.6</span>
          <span>4032 × 3024 px</span>
        </figcaption>
      </figure>

      <figure class="photo" data-category="india places">
        <img
          src="/images/photo-6.jpg"
          alt="quiet road in india"
          data-meta="akola, 2026 | iphone 13 · 26mm · f/1.6 | 3024 × 4032 px"
        />
        <figcaption>
          <span>akola, 2026</span>
          <span>iphone 13 · 26mm · f/1.6</span>

        </figcaption>
      </figure>

      <figure class="photo" data-category="europe people">
        <img
          src="/images/photo-7.jpg"
          alt="person walking in europe"
          data-meta="salzburg, 2026 | iphone 13 · 26mm · f/1.6 | 4032 × 3024 px"
        />
        <figcaption>
          <span>salzburg, 2026</span>
          <span>iphone 13 · 26mm · f/1.6</span>
          <span>4032 × 3024 px</span>
        </figcaption>
      </figure>

      <figure class="photo" data-category="europe places">
        <img
          src="/images/photo-8.jpg"
          alt="vienna river scene"
          data-meta="vienna, 2026 | iphone 13 · 26mm · f/1.6 | 3024 × 4032 px"
        />
        <figcaption>
          <span>vienna, 2026</span>
          <span>iphone 13 · 26mm · f/1.6</span>
          <span>3024 × 4032 px</span>
        </figcaption>
      </figure>

    </section>

    <footer class="footer">
      © sarthak dhole
    </footer>

  </main>

  <div class="lightbox" id="lightbox">
    <img src="" alt="" />
    <div class="lightbox-meta" id="lightboxMeta"></div>
  </div>

  <script>
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = lightbox.querySelector("img");
    const lightboxMeta = document.getElementById("lightboxMeta");

    document.querySelectorAll(".photo img").forEach((img) => {
      img.addEventListener("click", () => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightboxMeta.textContent = img.dataset.meta || "";
        lightbox.classList.add("open");
      });
    });

    lightbox.addEventListener("click", () => {
      lightbox.classList.remove("open");
      lightboxImg.src = "";
      lightboxMeta.textContent = "";
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        lightbox.classList.remove("open");
        lightboxImg.src = "";
        lightboxMeta.textContent = "";
      }
    });

    const filterButtons = document.querySelectorAll(".filters button");
    const photos = document.querySelectorAll(".photo");

    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        const filter = button.dataset.filter;

        filterButtons.forEach((btn) => btn.classList.remove("active"));
        button.classList.add("active");

        photos.forEach((photo) => {
          const categories = photo.dataset.category || "";

          if (filter === "all" || categories.includes(filter)) {
            photo.classList.remove("hidden");
          } else {
            photo.classList.add("hidden");
          }
        });
      });
    });
  </script>
</body>
</html>
