<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paintings</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #fff;
      color: #111;
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 34px 0 34px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-flow: dense;
      gap: 18px;
      align-items: start;
    }

    .painting {
      position: relative;
      overflow: hidden;
      background: #f5f5f5;
    }

    .painting img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .large {
      grid-column: span 7;
      grid-row: span 2;
      height: 560px;
    }

    .medium {
      grid-column: span 5;
      height: 360px;
    }

    .small {
      grid-column: span 4;
      height: 300px;
    }

    .wide {
      grid-column: span 8;
      height: 330px;
    }

    .tall {
      grid-column: span 4;
      grid-row: span 2;
      height: 540px;
    }

    .home-link {
      display: block;
      width: fit-content;
      margin: 34px auto 0;
      font-size: 13px;
      line-height: 1.4;
    }

    .home-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 860px) {
      .page {
        width: min(100% - 24px, 1180px);
        padding-top: 22px;
      }

      .gallery {
        grid-template-columns: repeat(6, 1fr);
        gap: 12px;
      }

      .large,
      .medium,
      .small,
      .wide,
      .tall {
        grid-column: span 6;
        grid-row: auto;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="gallery" id="gallery" aria-label="Paintings"></section>
    <a class="home-link" href="index.html">go back to home</a>
  </main>

  <script>
    const paintings = [
      { src: "Tree Spirit.JPEG", title: "Tree Spirit" },
      { src: "The Heads.png", title: "The Heads" },
      { src: "Lennon in the Park with Handkerchief.png", title: "Lennon in the Park with Handkerchief" },
      { src: "Incohesion, social.JPG", title: "Incohesion, social" },
      { src: "ETA to the Beach.png", title: "ETA to the Beach" },
      { src: "Cameluccino.jpeg", title: "Cameluccino" },
      { src: "A Week over the Bamboo.png", title: "A Week over the Bamboo" },
      { src: "A Tribute to Foley.png", title: "A Tribute to Foley" }
    ];

    const sizeClasses = ["large", "medium", "small", "tall", "wide", "small", "medium", "small"];

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function renderGallery() {
      const gallery = document.getElementById("gallery");
      const shuffledPaintings = shuffle(paintings);
      const shuffledSizes = shuffle(sizeClasses);

      gallery.innerHTML = shuffledPaintings
        .map((painting, index) => {
          const sizeClass = shuffledSizes[index % shuffledSizes.length];
          return `
            <article class="painting ${sizeClass}">
              <img src="${painting.src}" alt="${painting.title}" loading="lazy" />
            </article>
          `;
        })
        .join("");
    }

    renderGallery();
  </script>
</body>
</html>
