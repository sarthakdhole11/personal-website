<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>Paintings</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
:root {
--bg: #ffffff;
--text-main: #111;
--text-muted: #666;
--line: #e5e5e5;
}

[data-theme="dark"] {
--bg: #0e0f11;
--text-main: #e9e9ea;
--text-muted: #9a9a9d;
--line: #2a2b2f;
}

* { box-sizing: border-box; }

html, body {
margin: 0;
padding: 0;
background: var(--bg);
color: var(--text-main);
font-family: Georgia, "Times New Roman", Times, serif;
transition: background 0.8s ease, color 0.8s ease;
}

body {
min-height: 100vh;
display: flex;
justify-content: center;
}

body.theme-shift {
opacity: 0.96;
transition: opacity 0.6s ease;
}

main {
width: 100%;
max-width: 720px;
padding: 12vh 24px 64px;
position: relative;
}

a {
color: var(--text-main);
text-decoration: none;
border-bottom: 1px solid var(--line);
padding-bottom: 2px;
transition: opacity 0.3s ease, border-color 0.8s ease, color 0.8s ease;
}

a:hover { opacity: 0.6; }

.gallery {
display: grid;
grid-template-columns: repeat(6, 1fr);
grid-auto-flow: dense;
gap: 14px;
}

.painting {
overflow: hidden;
background: var(--line);
transition: background 0.8s ease;
}

.painting img {
width: 100%;
height: 100%;
display: block;
object-fit: cover;
}

.large {
grid-column: span 4;
height: 430px;
}

.medium {
grid-column: span 3;
height: 300px;
}

.small {
grid-column: span 2;
height: 220px;
}

.wide {
grid-column: span 6;
height: 300px;
}

.tall {
grid-column: span 3;
height: 460px;
}

.home {
margin-top: 48px;
font-size: 18px;
line-height: 1.7;
}

#theme-toggle {
position: fixed;
bottom: 24px;
right: 24px;
width: 44px;
height: 44px;
border-radius: 50%;
border: 1px solid var(--line);
background: var(--bg);
cursor: pointer;
z-index: 30;
display: grid;
place-items: center;
transition: border 0.8s ease, background 0.8s ease, opacity 0.3s ease;
}

#theme-toggle:hover { opacity: 0.7; }

#theme-toggle .dot {
width: 10px;
height: 10px;
border-radius: 50%;
background: var(--text-main);
transition: transform 0.45s ease, background 0.8s ease;
}

[data-theme="dark"] #theme-toggle .dot {
transform: scale(1.6);
}

#theme-ripple {
position: fixed;
inset: 0;
pointer-events: none;
clip-path: circle(0% at 100% 100%);
z-index: 20;
}

#theme-ripple.active {
animation: ripple 0.8s cubic-bezier(0.22,0.61,0.36,1) forwards;
}

@keyframes ripple {
to { clip-path: circle(150% at 100% 100%); }
}

@media (max-height: 700px) {
main { padding-top: 8vh; }
}

@media (max-height: 620px) {
main { padding-top: 6vh; }
}

@media (max-width: 620px) {
main {
padding: 8vh 24px 64px;
}

.gallery {
grid-template-columns: repeat(2, 1fr);
gap: 12px;
}

.large,
.medium,
.small,
.wide,
.tall {
grid-column: span 2;
height: auto;
}
}
</style>
</head>

<body>

<main>
<section class="gallery" id="gallery" aria-label="Paintings"></section>

<section class="home">
<p><a href="index.html">go back to home</a></p>
</section>
</main>

<button id="theme-toggle" aria-label="Toggle theme">
<span class="dot"></span>
</button>

<div id="theme-ripple"></div>

<script>
const paintings = [
{ src: "Tree Spirit.jpeg", title: "Tree Spirit" },
{ src: "The Heads.jpeg", title: "The Heads" },
{ src: "Lennon in the Park with Handkerchief.jpeg", title: "Lennon in the Park with Handkerchief" },
{ src: "Incohesion, social.jpeg", title: "Incohesion, social" },
{ src: "ETA to the Beach.jpeg", title: "ETA to the Beach" },
{ src: "Cameluccino.jpeg", title: "Cameluccino" },
{ src: "A Week over the Bamboo.jpeg", title: "A Week over the Bamboo" },
{ src: "A Tribute to Foley.jpeg", title: "A Tribute to Foley" }
];

const sizeClasses = ["large", "medium", "small", "tall", "wide", "small", "medium", "small"];

function shuffle(array) {
const copy = [...array];
for (let i = copy.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[copy[i], copy[j]] = [copy[j], copy[i]];
}
return copy;
}

function renderGallery() {
const gallery = document.getElementById("gallery");
const shuffledPaintings = shuffle(paintings);
const shuffledSizes = shuffle(sizeClasses);

gallery.innerHTML = shuffledPaintings
.map((painting, index) => {
const sizeClass = shuffledSizes[index % shuffledSizes.length];
return `
<article class="painting ${sizeClass}">
<img src="${painting.src}" alt="${painting.title}" loading="lazy" />
</article>
`;
})
.join("");
}

renderGallery();

const toggle = document.getElementById("theme-toggle");
const ripple = document.getElementById("theme-ripple");
const root = document.documentElement;

const saved = localStorage.getItem("theme");
if (saved) root.setAttribute("data-theme", saved);

toggle.addEventListener("click", () => {
ripple.classList.remove("active");
void ripple.offsetWidth;

const current = root.getAttribute("data-theme");
const next = current === "dark" ? "light" : "dark";

const tempBg = next === "dark" ? "#0e0f11" : "#ffffff";
ripple.style.background = tempBg;

document.body.classList.add("theme-shift");
ripple.classList.add("active");

setTimeout(() => {
root.setAttribute("data-theme", next);
}, 160);

setTimeout(() => {
ripple.classList.remove("active");
document.body.classList.remove("theme-shift");
}, 850);

localStorage.setItem("theme", next);
});
</script>

</body>
</html>
