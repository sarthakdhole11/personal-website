<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paintings</title>

  <style>
    :root {
      --bg: #f7f2ea;
      --ink: #171411;
      --muted: #6f665c;
      --line: rgba(23, 20, 17, 0.16);
      --card: #fffaf2;
      --accent: #8b3f2f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(139, 63, 47, 0.12), transparent 34rem),
        linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
      padding: 34px 0 70px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 28px;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      font-size: 15px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    nav {
      display: flex;
      gap: 20px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    nav a {
      position: relative;
    }

    nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -5px;
      width: 0;
      height: 1px;
      background: var(--ink);
      transition: width 180ms ease;
    }

    nav a:hover::after,
    nav a.active::after {
      width: 100%;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 38px;
      align-items: end;
      padding: 58px 0 42px;
    }

    h1 {
      max-width: 760px;
      font-size: clamp(54px, 10vw, 138px);
      line-height: 0.88;
      letter-spacing: -0.075em;
      font-weight: 400;
    }

    .hero-copy {
      max-width: 430px;
      justify-self: end;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.65;
    }

    .hero-copy span {
      color: var(--accent);
      font-style: italic;
    }

    .gallery-shell {
      padding-top: 8px;
    }

    .gallery-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      grid-auto-flow: dense;
      gap: 18px;
    }

    .painting {
      position: relative;
      overflow: hidden;
      min-height: 260px;
      background: var(--card);
      border: 1px solid rgba(23, 20, 17, 0.12);
      box-shadow: 0 20px 50px rgba(23, 20, 17, 0.08);
      isolation: isolate;
    }

    .painting::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.44));
      z-index: 1;
      opacity: 0;
      transition: opacity 260ms ease;
    }

    .painting img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      filter: saturate(0.92) contrast(1.04);
      transform: scale(1.015);
      transition: transform 420ms ease, filter 420ms ease;
    }

    .painting:hover img {
      transform: scale(1.055);
      filter: saturate(1.04) contrast(1.08);
    }

    .painting:hover::before {
      opacity: 1;
    }

    .caption {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 14px;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #fffaf2;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 240ms ease, transform 240ms ease;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 12px;
      letter-spacing: 0.11em;
      text-transform: uppercase;
    }

    .painting:hover .caption {
      opacity: 1;
      transform: translateY(0);
    }

    .large {
      grid-column: span 7;
      grid-row: span 2;
      min-height: 560px;
    }

    .medium {
      grid-column: span 5;
      min-height: 360px;
    }

    .small {
      grid-column: span 4;
      min-height: 300px;
    }

    .wide {
      grid-column: span 8;
      min-height: 330px;
    }

    .tall {
      grid-column: span 4;
      grid-row: span 2;
      min-height: 540px;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      padding-top: 34px;
      margin-top: 42px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    @media (max-width: 860px) {
      header,
      footer,
      .hero,
      .gallery-meta {
        display: block;
      }

      nav {
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .hero {
        padding: 42px 0 32px;
      }

      .hero-copy {
        margin-top: 22px;
        justify-self: start;
      }

      .gallery {
        grid-template-columns: repeat(6, 1fr);
      }

      .large,
      .medium,
      .small,
      .wide,
      .tall {
        grid-column: span 6;
        min-height: 390px;
      }

      .gallery-meta p + p {
        margin-top: 8px;
      }
    }

    @media (max-width: 520px) {
      .page {
        width: min(100% - 24px, 1180px);
        padding-top: 22px;
      }

      h1 {
        font-size: clamp(48px, 20vw, 86px);
      }

      .painting,
      .large,
      .medium,
      .small,
      .wide,
      .tall {
        min-height: 310px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <a class="brand" href="index.html">Sarthak Dhole</a>
      <nav aria-label="Primary navigation">
        <a href="index.html">Index</a>
        <a class="active" href="paintings.html">Paintings</a>
      </nav>
    </header>

    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Paintings</h1>
      <p class="hero-copy">
        A rotating wall of studies, fragments, moods, and finished pieces. The order is intentionally unstable: <span>refresh to reshuffle the room.</span>
      </p>
    </section>

    <section class="gallery-shell" aria-label="Painting gallery">
      <div class="gallery-meta">
        <p>Selected works</p>
        <p>Images shuffle on refresh</p>
      </div>

      <div class="gallery" id="gallery"></div>
    </section>

    <footer>
      <p>Paintings / mixed media / studies</p>
      <p>© <span id="year"></span> Sarthak Dhole</p>
    </footer>
  </main>

  <script>
    const paintings = [
      { src: "painting-1.jpg", title: "Painting 1" },
      { src: "painting-2.jpg", title: "Painting 2" },
      { src: "painting-3.jpg", title: "Painting 3" },
      { src: "painting-4.jpg", title: "Painting 4" },
      { src: "painting-5.jpg", title: "Painting 5" },
      { src: "painting-6.jpg", title: "Painting 6" },
      { src: "painting-7.jpg", title: "Painting 7" },
      { src: "painting-8.jpg", title: "Painting 8" },
      { src: "painting-9.jpg", title: "Painting 9" },
      { src: "painting-10.jpg", title: "Painting 10" },
      { src: "painting-11.jpg", title: "Painting 11" },
      { src: "painting-12.jpg", title: "Painting 12" }
    ];

    const sizeClasses = ["large", "medium", "small", "tall", "wide", "small", "medium", "small", "tall", "wide", "small", "medium"];

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function renderGallery() {
      const gallery = document.getElementById("gallery");
      const shuffledPaintings = shuffle(paintings);
      const shuffledSizes = shuffle(sizeClasses);

      gallery.innerHTML = shuffledPaintings
        .map((painting, index) => {
          const sizeClass = shuffledSizes[index % shuffledSizes.length];
          return `
            <article class="painting ${sizeClass}">
              <img src="${painting.src}" alt="${painting.title}" loading="lazy" />
              <div class="caption">
                <span>${painting.title}</span>
                <span>${painting.src}</span>
              </div>
            </article>
          `;
        })
        .join("");
    }

    document.getElementById("year").textContent = new Date().getFullYear();
    renderGallery();
  </script>
</body>
</html>
